name: cash_in
description: Aplikasi database keuangan pribadi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # Charts
  fl_chart: ^0.68.0

  # Networking & connectivity
  connectivity_plus: ^6.0.3
  http: ^1.2.1

  # ENV
  flutter_dotenv: ^5.1.0

  # URL launcher (download APK)
  url_launcher: ^6.2.6

  # Local storage (session)
  shared_preferences: ^2.2.3

  # Date picker
  table_calendar: ^3.1.2

  # Number formatting (Rupiah)
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

  # Loading animations
  shimmer: ^3.0.0

  # Google Fonts (RobotoMono + Inter)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
